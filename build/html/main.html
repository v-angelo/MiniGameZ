<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MiniGames Zone</title>
    <!-- favicon -->
    <link rel="icon" href="../img/icon.ico" />
    <!-- css -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body class="min-h-screen dark:bg-slate-950 bg-slate-50 dark:text-white">
    <!-- header -->
    <header class="bg-purple-600 dark:bg-purple-950 sticky top-0 z-10">
      <!-- navbar -->
      <nav
        class="flex flex-row lg:max-w-5xl mx-auto px-3 py-2 h-16 justify-between"
      >
        <!-- logo and title -->
        <a
          class="w-60 flex justify-between hover:opacity-90"
          href="../index.html"
        >
          <img class="h-full" src="../img/icon.png" alt="logo" />
          <h3 class="flex items-center justify-center text-2xl font-semibold">
            MiniGames Zone
          </h3>
        </a>
        <!-- dark/light toggle -->
        <section
          class="flex justify-evenly items-center text-2xl font-semibold gap-4"
        >
          <!-- links -->
          <div class="flex w-70 justify-between max-sm:hidden">
            <a href="../index.html" class="cursor-pointer hover:opacity-90"
              >Home</a
            >
            <a
              href="../index.html#games"
              class="cursor-pointer hover:opacity-90"
              >Games</a
            >
            <span class="cursor-pointer hover:opacity-90">Score</span>
          </div>
          <!-- dark/light icons -->
          <div class="ms-5 text-amber-500 hover:text-amber-600 cursor-pointer">
            <span class="sun"><i class="fa-regular fa-sun"></i></span>
            <span class="moon"><i class="fa-regular fa-moon"></i></span>
          </div>
          <div class="sm:hidden text-3xl font-bold">☰</div>
        </section>
      </nav>
    </header>

    <!-- game -->
    <main></main>
  </body>
  <!-- fontawesome cdn -->
  <script
    src="https://kit.fontawesome.com/7e59fb41a7.js"
    crossorigin="anonymous"
  ></script>

  <!-- Light/Dark Theme JS -->
  <script src="../js/theme.js"></script>
</html>
